name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run non-integration tests (pytest)
        run: python -m pytest -q -m "not integration"

      - name: Start Mongo test container
        run: docker compose -f docker/docker-compose.test.yml up -d mongo

      - name: Run integration tests in docker test container
        run: docker compose -f docker/docker-compose.test.yml run --rm test python -m pytest -q -m integration

      - name: Cleanup docker-compose test stack
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v
