name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit/integration tests (pytest)
        run: python -m pytest -q

      - name: Run docker-compose test stack
        run: docker compose -f docker/docker-compose.test.yml up --build --abort-on-container-exit

      - name: Cleanup docker-compose test stack
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v
