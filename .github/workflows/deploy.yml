name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: "배포할 브랜치명"
        required: false
        default: "main"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-ec2:
    runs-on: ubuntu-latest
    steps:
      - name: Preflight - check EC2 SSH connectivity
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -e
          if [ -z "$EC2_HOST" ]; then
            echo "EC2_HOST secret is empty."
            exit 1
          fi
          echo "Checking TCP connectivity to ${EC2_HOST}:22 ..."
          if nc -zvw 5 "$EC2_HOST" 22; then
            echo "TCP 22 reachable."
          else
            echo "Cannot reach ${EC2_HOST}:22 from GitHub runner."
            echo "Check EC2 security group, subnet route table(IGW), and NACL rules."
            exit 1
          fi

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            BRANCH="${{ github.event.inputs.branch }}"
            if [ -z "$BRANCH" ]; then
              BRANCH="main"
            fi
            export APP_DIR="${{ secrets.EC2_APP_DIR }}"
            export REPO_URL="https://github.com/${{ github.repository }}.git"
            export BRANCH
            bash -s <<'EOF'
            set -euo pipefail
            APP_DIR="${APP_DIR:-$HOME/jungle-soop}"
            REPO_URL="${REPO_URL}"
            BRANCH="${BRANCH:-main}"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            APP_DIR="$APP_DIR" REPO_URL="$REPO_URL" BRANCH="$BRANCH" bash scripts/deploy.sh
            EOF
