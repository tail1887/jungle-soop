<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Jungle Soop{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <h1><a href="{{ url_for('index') }}">Jungle Soop</a></h1>
        {% if not hide_nav %}
        <nav>
            <a href="{{ url_for('meeting_list') }}">모임 목록</a>
            <a href="{{ url_for('meeting_new') }}">모임 만들기</a>
            <a href="{{ url_for('profile_page') }}">프로필</a>
            <button id="nav-logout-button" class="nav-button" type="button">로그아웃</button>
        </nav>
        {% endif %}
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    {% if not hide_nav %}
    <script src="{{ url_for('static', filename='js/nav.js') }}"></script>
    {% endif %}
    {% block scripts %}{% endblock %}
</body>
</html>
