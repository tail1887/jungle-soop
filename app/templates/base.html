<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Jungle Soop{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
    <header class="site-header border-b border-slate-700 bg-slate-900 px-4 py-4 text-white md:px-8">
        <div class="mx-auto flex w-full max-w-5xl items-center justify-between">
        <h1 class="text-xl font-semibold"><a href="{{ url_for('index') }}" class="text-white no-underline">Jungle Soop</a></h1>
        {% if not hide_nav %}
        <nav class="flex items-center gap-3">
            <a class="rounded px-3 py-2 text-sm font-medium text-white transition hover:bg-slate-700" href="{{ url_for('meeting_list') }}">모임 목록</a>
            <a class="rounded px-3 py-2 text-sm font-medium text-white transition hover:bg-slate-700" href="{{ url_for('meeting_new') }}">모임 만들기</a>
            <a class="rounded px-3 py-2 text-sm font-medium text-white transition hover:bg-slate-700" href="{{ url_for('profile_page') }}">프로필</a>
            <button id="nav-logout-button" class="nav-button rounded bg-slate-700 px-3 py-2 text-sm font-medium text-white transition hover:bg-slate-600" type="button">로그아웃</button>
        </nav>
        {% endif %}
        </div>
    </header>
    <main class="container mx-auto w-full max-w-5xl px-4 py-6 md:px-6">
        {% block content %}{% endblock %}
    </main>
    {% if not hide_nav %}
    <script src="{{ url_for('static', filename='js/nav.js') }}"></script>
    {% endif %}
    {% block scripts %}{% endblock %}
</body>
</html>
