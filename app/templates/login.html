{% extends "base.html" %}
{% block title %}Jungle Soop | 로그인{% endblock %}
{% block content %}
<section class="card">
    <h2>로그인</h2>
    <p class="helper-text">이메일과 비밀번호를 입력해 로그인하세요.</p>
    <form id="login-form" novalidate>
        <label for="email">이메일</label>
        <input id="email" name="email" type="email" placeholder="example@jungle.soop" required>
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" placeholder="비밀번호 입력" required>
        <p id="login-message" class="form-message" role="alert" aria-live="polite"></p>
        <button id="login-submit-button" type="submit">로그인</button>
    </form>
    <p class="helper-text">아직 계정이 없다면 <a href="{{ url_for('signup') }}">회원가입</a>을 진행하세요.</p>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
