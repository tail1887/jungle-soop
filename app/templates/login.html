{% extends "base.html" %}
{% block title %}Jungle Soop | 로그인{% endblock %}
{% block content %}
<section class="card mx-auto max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
    <h2 class="text-2xl font-bold text-slate-900">로그인</h2>
    <p class="mt-2 text-sm text-slate-500">이메일과 비밀번호를 입력해 로그인하세요.</p>
    <form id="login-form" class="mt-5 space-y-4" novalidate>
        <label for="email" class="block text-sm font-medium text-slate-700">이메일</label>
        <input id="email" name="email" type="email" placeholder="example@jungle.soop" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        <label for="password" class="block text-sm font-medium text-slate-700">비밀번호</label>
        <input id="password" name="password" type="password" placeholder="비밀번호 입력" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        <p id="login-message" class="form-message min-h-5 text-sm text-slate-600" role="alert" aria-live="polite"></p>
        <button id="login-submit-button" type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500">로그인</button>
    </form>
    <p class="helper-text mt-4 text-sm text-slate-500">아직 계정이 없다면 <a class="font-medium text-indigo-600 hover:text-indigo-500" href="{{ url_for('signup') }}">회원가입</a>을 진행하세요.</p>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
