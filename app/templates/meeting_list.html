{% extends "base.html" %}
{% block title %}Jungle Soop | 모임 목록{% endblock %}
{% block content %}
<section class="card">
    <h2>모임 목록</h2>
    <p class="helper-text">API 응답 상태에 따라 목록 UI를 갱신합니다.</p>
    <div class="meeting-toolbar">
        <div id="meetings-toolbar-left" class="meeting-toolbar-group">
            <select id="meetings-filter-category" aria-label="카테고리 필터">
                <option value="">전체</option>
                <option value="meal">식사</option>
                <option value="exercise">운동</option>
                <option value="study">스터디</option>
                <option value="other">기타</option>
            </select>
            <button id="meetings-filter-status" type="button" aria-label="상태 필터">모집중</button>
            <button id="meetings-sort-latest" type="button" aria-label="정렬">최신순</button>
        </div>
        <button id="meetings-refresh-button" type="button">새로고침</button>
        <a class="button-link" href="{{ url_for('meeting_new') }}">모임 만들기</a>
    </div>
    <div id="meetings-search-row" class="meeting-search-row">
        <input id="meetings-search-input" type="text" placeholder="모임 제목 검색" aria-label="모임 제목 검색" />
        <button id="meetings-search-button" type="button">검색</button>
    </div>
    <p id="meetings-list-message" class="form-message" role="alert" aria-live="polite"></p>
    <ul id="meetings-list" class="meeting-list"></ul>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/meetings.js') }}"></script>
{% endblock %}
