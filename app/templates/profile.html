{% extends "base.html" %}
{% block title %}Jungle Soop | 프로필{% endblock %}
{% block content %}
<section class="card rounded-2xl border border-slate-200 bg-white p-6 shadow-sm md:p-8" id="profile-root">
    <h2 class="text-2xl font-bold text-slate-900">내 프로필</h2>
    <p id="profile-message" class="form-message mt-2 min-h-5 text-sm text-slate-600" role="alert" aria-live="polite"></p>
    <div class="profile-avatar-block mt-4 flex items-start gap-3">
        <img id="profile-avatar-image" class="profile-avatar-image" src="" alt="프로필 이미지">
        <form id="profile-avatar-form" class="profile-avatar-form flex flex-col gap-2" novalidate>
            <label for="profile-avatar-input" class="text-sm font-medium text-slate-700">프로필 이미지</label>
            <input id="profile-avatar-input" name="avatar" type="file" accept="image/*" class="rounded-lg border border-slate-300 px-3 py-2 text-sm">
            <button id="profile-avatar-save-button" type="submit" class="rounded-lg bg-indigo-600 px-3 py-2 text-sm font-medium text-white hover:bg-indigo-500">이미지 업로드</button>
        </form>
    </div>
    <p class="helper-text mt-4 text-sm text-slate-500">이메일: <strong id="profile-email">-</strong></p>
    <form id="profile-edit-form" class="mt-3 space-y-3" novalidate>
        <label for="profile-nickname" class="block text-sm font-medium text-slate-700">닉네임</label>
        <input id="profile-nickname" name="nickname" type="text" placeholder="닉네임 입력" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        <button id="profile-save-button" type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500">닉네임 저장</button>
    </form>
</section>

<section class="card mt-6 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm md:p-8" id="profile-meetings-root">
    <h2 class="text-2xl font-bold text-slate-900">내 모임</h2>
    <div class="meeting-toolbar mt-4 flex flex-wrap gap-2">
        <button type="button" class="profile-tab-button rounded-lg bg-slate-200 px-3 py-2 text-sm font-medium text-slate-700" data-tab="created">내가 만든 모임</button>
        <button type="button" class="profile-tab-button rounded-lg bg-slate-200 px-3 py-2 text-sm font-medium text-slate-700" data-tab="joined_active">참여 중인 모임</button>
        <button type="button" class="profile-tab-button rounded-lg bg-slate-200 px-3 py-2 text-sm font-medium text-slate-700" data-tab="joined_past">참여했던 모임</button>
    </div>
    <p id="profile-meetings-message" class="form-message mt-3 min-h-5 text-sm text-slate-600" role="alert" aria-live="polite"></p>
    <ul id="profile-meetings-list" class="meeting-list mt-3 grid gap-3"></ul>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
{% endblock %}
