{% extends "base.html" %}
{% block title %}Jungle Soop | 사용자 프로필{% endblock %}
{% block content %}
<section class="card mx-auto max-w-lg rounded-2xl border border-slate-200 bg-white p-6 shadow-sm" id="user-profile-root" data-user-id="{{ user_id }}">
    <h2 class="text-2xl font-bold text-slate-900">사용자 프로필</h2>
    <p id="user-profile-message" class="form-message mt-2 min-h-5 text-sm text-slate-600" role="alert" aria-live="polite"></p>
    <div class="user-profile-avatar-block mt-4">
        <img id="user-profile-avatar-image" class="user-profile-avatar-image" src="" alt="사용자 프로필 이미지">
    </div>
    <p class="helper-text mt-3 text-sm text-slate-500">닉네임: <strong id="user-profile-nickname">-</strong></p>
    <p class="helper-text mt-1 text-sm text-slate-500">이메일: <strong id="user-profile-email">-</strong></p>
    <div class="meeting-toolbar mt-4">
        <a class="button-link inline-flex items-center justify-center rounded-lg bg-slate-800 px-3 py-2 text-sm font-medium text-white no-underline hover:bg-slate-700" href="{{ url_for('meeting_list') }}">모임 목록으로</a>
    </div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/user_profile_page.js') }}"></script>
{% endblock %}
