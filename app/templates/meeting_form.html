{% extends "base.html" %}
{% block title %}Jungle Soop | 모임 만들기{% endblock %}
{% block content %}
<section class="card">
    <h2>모임 만들기</h2>
    <form>
        <label for="title">제목</label>
        <input id="title" type="text" placeholder="모임 제목">
        <label for="description">설명</label>
        <textarea id="description" rows="4" placeholder="모임 설명"></textarea>
        <label for="capacity">모집 인원</label>
        <input id="capacity" type="number" min="2" max="20" value="4">
        <button type="submit">등록하기</button>
    </form>
</section>
{% endblock %}
