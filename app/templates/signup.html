{% extends "base.html" %}
{% block title %}Jungle Soop | 회원가입{% endblock %}
{% block content %}
<section class="card">
    <h2>회원가입</h2>
    <p class="helper-text">닉네임, 이메일, 비밀번호를 입력해 계정을 생성하세요.</p>
    <form id="signup-form" novalidate>
        <label for="nickname">닉네임</label>
        <input id="nickname" name="nickname" type="text" placeholder="닉네임 입력" required>
        <label for="signup-email">이메일</label>
        <input id="signup-email" name="email" type="email" placeholder="example@jungle.soop" required>
        <label for="signup-password">비밀번호</label>
        <input id="signup-password" name="password" type="password" placeholder="비밀번호 입력" required>
        <p id="signup-message" class="form-message" role="alert" aria-live="polite"></p>
        <button type="submit">가입하기</button>
    </form>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
