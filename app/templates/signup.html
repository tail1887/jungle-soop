{% extends "base.html" %}
{% block title %}Jungle Soop | 회원가입{% endblock %}
{% block content %}
<section class="card">
    <h2>회원가입</h2>
    <form>
        <label for="nickname">닉네임</label>
        <input id="nickname" type="text" placeholder="닉네임 입력">
        <label for="signup-email">이메일</label>
        <input id="signup-email" type="email" placeholder="example@jungle.soop">
        <label for="signup-password">비밀번호</label>
        <input id="signup-password" type="password" placeholder="비밀번호 입력">
        <button type="submit">가입하기</button>
    </form>
</section>
{% endblock %}
