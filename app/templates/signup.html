{% extends "base.html" %}
{% block title %}Jungle Soop | 회원가입{% endblock %}
{% block content %}
<section class="card mx-auto max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
    <h2 class="text-2xl font-bold text-slate-900">회원가입</h2>
    <p class="mt-2 text-sm text-slate-500">닉네임, 이메일, 비밀번호를 입력해 계정을 생성하세요.</p>
    <form id="signup-form" class="mt-5 space-y-4" novalidate>
        <label for="nickname" class="block text-sm font-medium text-slate-700">닉네임</label>
        <input id="nickname" name="nickname" type="text" placeholder="닉네임 입력" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        <label for="signup-email" class="block text-sm font-medium text-slate-700">이메일</label>
        <input id="signup-email" name="email" type="email" placeholder="example@jungle.soop" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        <label for="signup-password" class="block text-sm font-medium text-slate-700">비밀번호</label>
        <input id="signup-password" name="password" type="password" placeholder="비밀번호 입력" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        <label for="signup-password-confirm" class="block text-sm font-medium text-slate-700">비밀번호 확인</label>
        <input id="signup-password-confirm" name="password_confirm" type="password" placeholder="비밀번호 다시 입력" required class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        <p id="signup-message" class="form-message min-h-5 text-sm text-slate-600" role="alert" aria-live="polite"></p>
        <button id="signup-submit-button" type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500">가입하기</button>
    </form>
    <p class="helper-text mt-4 text-sm text-slate-500">이미 계정이 있다면 <a class="font-medium text-indigo-600 hover:text-indigo-500" href="{{ url_for('login') }}">로그인</a>하세요.</p>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
