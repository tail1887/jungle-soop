{% extends "base.html" %}
{% block title %}Jungle Soop | 모임 상세{% endblock %}
{% block content %}
<section class="card" id="meeting-detail-root" data-meeting-id="{{ meeting_id }}">
    <h2>모임 상세</h2>
    <p class="helper-text">meeting_id: <strong id="meeting-id-label">{{ meeting_id }}</strong></p>
    <p id="meeting-detail-message" class="form-message" role="alert" aria-live="polite"></p>
    <div class="meeting-detail">
        <h3 id="meeting-detail-title">로딩 중...</h3>
        <p id="meeting-detail-meta"></p>
        <p id="meeting-detail-description"></p>
    </div>
    <div class="meeting-toolbar">
        <button id="meeting-edit-button" type="button">정보수정</button>
        <button id="meeting-close-button" type="button">조기마감</button>
        <button id="meeting-join-button" type="button">참여하기</button>
        <button id="meeting-cancel-button" type="button">참여 취소</button>
        <button id="meeting-detail-refresh-button" type="button">상세 새로고침</button>
        <a class="button-link" href="{{ url_for('meeting_list') }}">목록으로</a>
    </div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/meetings.js') }}"></script>
{% endblock %}
