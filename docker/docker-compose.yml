services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python run.py
    ports:
      - "5000:5000"
    env_file:
      - path: ../.env
        required: false
    environment:
      - MONGO_URI=mongodb://mongo:27017/jungle_soop
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
